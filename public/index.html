<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Nassr Writes — Writing. Artist Development. Curated Spaces.</title>
    <meta name="description" id="metaDescription" content="A reflective professional operating at the intersection of culture, storytelling, and community.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav id="navbar"></nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-tagline" id="heroHeadline">Writing. Artist Development.<br><em>Curated Spaces.</em></h1>
            <p class="hero-statement" id="heroStatement"></p>
        </div>
        <div class="scroll-indicator">
            <div class="scroll-line"></div>
            <span>Explore</span>
        </div>
    </section>

    <!-- Practices Overview -->
    <section id="practices">
        <div class="practices-grid" id="practicesGrid"></div>
        <div class="philosophy fade-in">
            <span class="philosophy-label">Working Philosophy</span>
            <p class="philosophy-text" id="philosophyText"></p>
        </div>
    </section>

    <!-- Newsletter -->
    <section id="newsletter">
        <div class="newsletter-inner">
            <div class="fade-in">
                <span class="section-label">Stay Close</span>
                <h2 class="newsletter-title">Letters from<br><em>the practice.</em></h2>
                <p class="newsletter-body">Occasional dispatches on writing, artist development, and curated living. No noise — only what's worth your attention.</p>
            </div>
            <div class="fade-in">
                <form class="newsletter-form" id="newsletterForm">
                    <input type="text" id="nlName" placeholder="Your name" autocomplete="name" />
                    <input type="email" id="nlEmail" placeholder="Your email address" autocomplete="email" required />
                    <button type="submit" class="newsletter-submit" id="nlSubmit">Subscribe</button>
                    <p class="newsletter-message" id="nlMessage"></p>
                </form>
            </div>
        </div>
    </section>

    <footer id="footer"></footer>

    <script src="/components.js"></script>
    <script>
        initPage(function (content) {
            document.getElementById('pageTitle').textContent = `${content.site.title} — ${content.site.tagline}`;
            document.getElementById('metaDescription').content = content.site.description;
            document.getElementById('heroHeadline').innerHTML = content.hero.headline;
            document.getElementById('heroStatement').textContent = content.hero.statement;

            document.getElementById('practicesGrid').innerHTML = content.practices.map(p => `
                <a href="${p.link}" class="practice-tile fade-in">
                    <span class="practice-number">${p.number}</span>
                    <h2 class="practice-title">${p.title}</h2>
                    <p class="practice-excerpt">${p.excerpt}</p>
                    <span class="practice-link">${p.linkText}</span>
                </a>`).join('');

            document.getElementById('philosophyText').textContent = content.philosophy;
        });
    </script>
</body>
</html>
