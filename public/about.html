<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Nassr Writes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav id="navbar"></nav>

    <div class="page-hero fade-in">
        <span class="page-hero-label">The Person</span>
        <h1 class="page-hero-title" id="aboutPageTitle">About</h1>
        <p class="page-hero-subtitle" id="aboutPageSubtitle"></p>
    </div>

    <section id="about">
        <div class="about-inner">
            <div class="about-portrait fade-in">
                <div class="portrait-placeholder" id="aboutPortrait">Portrait</div>
            </div>
            <div class="about-content fade-in">
                <p class="about-intro" id="aboutIntro"></p>
                <p class="about-body" id="aboutBody1"></p>
                <blockquote class="pullquote" id="aboutPullquote"></blockquote>
                <p class="about-body" id="aboutBody2"></p>
            </div>
        </div>
    </section>

    <footer id="footer"></footer>

    <script src="/components.js"></script>
    <script>
        initPage(function (content) {
            document.getElementById('aboutPageSubtitle').textContent = content.site.description;

            if (content.about.portraitUrl) {
                document.getElementById('aboutPortrait').innerHTML =
                    `<img src="${content.about.portraitUrl}" alt="Portrait">`;
            }
            document.getElementById('aboutIntro').textContent    = content.about.intro;
            document.getElementById('aboutBody1').textContent    = content.about.body1;
            document.getElementById('aboutPullquote').textContent = `"${content.about.pullquote}"`;
            document.getElementById('aboutBody2').textContent    = content.about.body2;
        });
    </script>
</body>
</html>
